<ion-split-pane contentId="main-content" when="md">

  <!-- Sidebar / Drawer -->
  <ion-menu contentId="main-content" type="overlay">

    <!-- Brand header -->
    <ion-header>
      <ion-toolbar class="sidebar-toolbar">
        <div class="sidebar-brand">
          <ion-icon name="receipt-outline" class="brand-icon"></ion-icon>
          <span class="brand-name">Invoicer</span>
        </div>
      </ion-toolbar>
    </ion-header>

    <!-- Navigation items -->
    <ion-content class="sidebar-content">

      <!-- User info block -->
      <div class="user-info" (click)="goToProfile()">
        <div class="user-avatar">{{ userInitial }}</div>
        <div class="user-details">
          <span class="user-name">{{ userName }}</span>
          <span class="user-email">{{ userEmail }}</span>
        </div>
        <ion-icon name="chevron-forward-outline" class="user-chevron"></ion-icon>
      </div>

      <ion-list lines="none" class="nav-list">

        <ion-item
          button
          class="nav-item"
          routerLink="/dashboard"
          routerLinkActive="nav-active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()">
          <ion-icon name="grid-outline" slot="start"></ion-icon>
          <ion-label>Dashboard</ion-label>
        </ion-item>

        <ion-item
          button
          class="nav-item"
          routerLink="/clients"
          routerLinkActive="nav-active"
          (click)="closeMenu()">
          <ion-icon name="people-outline" slot="start"></ion-icon>
          <ion-label>Clientes</ion-label>
        </ion-item>

        <ion-item
          button
          class="nav-item"
          routerLink="/editor/new"
          routerLinkActive="nav-active"
          (click)="closeMenu()">
          <ion-icon name="add-circle-outline" slot="start"></ion-icon>
          <ion-label>Nueva Factura</ion-label>
        </ion-item>

      </ion-list>
    </ion-content>

    <!-- Footer: Perfil + Logout -->
    <ion-footer class="sidebar-footer">
      <ion-list lines="none">
        <ion-item
          button
          class="nav-item"
          routerLink="/profile"
          routerLinkActive="nav-active"
          (click)="closeMenu()">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-label>Mi Perfil</ion-label>
        </ion-item>
        <ion-item
          button
          class="nav-item"
          routerLink="/about"
          routerLinkActive="nav-active"
          (click)="closeMenu()">
          <ion-icon name="information-circle-outline" slot="start"></ion-icon>
          <ion-label>Acerca de</ion-label>
        </ion-item>
        <ion-item button class="nav-item logout-item" (click)="signOut()">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Cerrar Sesión</ion-label>
        </ion-item>
      </ion-list>
    </ion-footer>

  </ion-menu>

  <!-- Main content outlet -->
  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-split-pane>
